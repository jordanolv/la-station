name: 🚀 Deploy The Ridge Bot DEV to VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/vps_key \
              -p ${{ secrets.VPS_PORT }} \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'

            set -e

            echo "✅ Connected to VPS"

            PROJECT_DIR=~/projects/theridge-bot/dev
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            if [ ! -d ".git" ]; then
              echo "📁 Initial clone"
              git clone -b dev https://${{ secrets.GH_TOKEN }}@github.com/jordanolv/la-station.git .
            else
              echo "📦 Git repo already present, pulling latest code"
              git fetch origin
              git reset --hard origin/dev
            fi

            echo "🛠 Backend – install & build"
            npm ci
            npm run build

            echo "🚀 PM2 Reload all apps via ecosystem"
            pm2 reload ecosystem.config.cjs
            pm2 save

            echo "✅ TheRidgeBot DEV deployment finished 🎉"
          EOF